<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRV8871 电机驱动控制面板</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.rawgit.com/Mikhus/canvas-gauges/gh-pages/download/2.1.7/all/gauge.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.4/dist/mqtt.min.js"></script>
    
    <style>
        /* Custom Scrollbar for Industrial Look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            grid-auto-rows: 100px;
            gap: 1rem;
            padding: 1rem;
        }
        
        /* Widget Card Style */
        .widget-card {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        /* Mobile Breakpoint - Responsive Design */
        @media (max-width: 768px) {
            .grid-container {
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
            }
            .widget-card {
                grid-column: span 12 !important;
                grid-row: auto !important;
                min-height: 120px; /* Finger-friendly touch targets */
            }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-200 min-h-screen font-sans" x-data="hmiStore">

    <header class="bg-slate-900 border-b border-slate-700 p-4 mb-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-blue-400">DRV8871 电机驱动控制面板</h1>
            <p class="text-xs text-slate-500"></p>
        </div>
        <div class="text-right">
            <div class="text-xs text-slate-500 font-mono">DSL v1.0</div>
            <div class="text-[10px] text-slate-600 font-mono">Hash: 420e4c95</div>
        </div>
    </header>

    <main class="container mx-auto">
        <div class="grid-container">
            
        <div class="widget-card group" style="grid-column: 1 / span 6; grid-row: 3 / span 2;" x-data>
            
            <div class="absolute top-1 right-1 px-1.5 py-0.5 bg-black/50 rounded text-[9px] text-slate-400 font-mono border border-slate-700" 
                 title="Protocol: ProtocolType.MQTT&#10;Address: drv8871/control/current_limit">
                PROTOCOLTYPE.MQTT:drv8871/control/current_limit
            </div>
            
            
    <div class="h-full flex flex-col justify-between">
        <div class="flex justify-between items-center mb-2">
            <label class="text-sm font-medium text-slate-300">峰值电流限制 (Peak Current)</label>
            <span class="text-xs font-mono bg-slate-700 px-2 py-1 rounded" x-text="values['current_limit_slider']"></span>
        </div>
        <div class="flex-grow flex items-center">
            <input type="range" 
                   min="0.0" max="3.5" step="0.05"
                   x-model.number="values['current_limit_slider']"
                   @input="updateValue('current_limit_slider', $event.target.value)"
                   class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
        </div>
        <div class="flex justify-between text-[10px] text-slate-500 mt-1">
            <span>0.0</span>
            <span>3.5</span>
        </div>
    </div>
    
        </div>
        

        <div class="widget-card group" style="grid-column: 7 / span 6; grid-row: 3 / span 2;" x-data>
            
            <div class="absolute top-1 right-1 px-1.5 py-0.5 bg-black/50 rounded text-[9px] text-slate-400 font-mono border border-slate-700" 
                 title="Protocol: ProtocolType.MQTT&#10;Address: drv8871/control/enable">
                PROTOCOLTYPE.MQTT:drv8871/control/enable
            </div>
            
            
    <div class="h-full flex flex-col justify-center items-center">
        <div class="text-sm font-medium text-slate-300 mb-3">电机启停控制</div>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" 
                   class="sr-only peer"
                   x-model="values['motor_enable_switch']"
                   @change="updateValue('motor_enable_switch', $event.target.checked)">
            <div class="w-14 h-7 bg-slate-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-blue-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-green-600"></div>
        </label>
        <div class="mt-2 text-xs font-mono text-slate-400">
            <span x-show="values['motor_enable_switch']">ON</span>
            <span x-show="!values['motor_enable_switch']">OFF</span>
        </div>
    </div>
    
        </div>
        

        <div class="widget-card group" style="grid-column: 7 / span 6; grid-row: 1 / span 2;" x-data>
            
            <div class="absolute top-1 right-1 px-1.5 py-0.5 bg-black/50 rounded text-[9px] text-slate-400 font-mono border border-slate-700" 
                 title="Protocol: ProtocolType.MQTT&#10;Address: drv8871/control/frequency">
                PROTOCOLTYPE.MQTT:drv8871/control/frequency
            </div>
            
            
    <div class="h-full flex flex-col justify-center">
        <label class="text-sm font-medium text-slate-300 mb-2">PWM 频率设定</label>
        <input type="number"
                min="0.0" max="200.0" step="0.5"
               value="20.0"
               x-model="values['pwm_freq_input']"
               @input="updateValue('pwm_freq_input', $event.target.value)"
               class="w-full rounded border border-slate-600 bg-slate-800 px-3 py-2 text-slate-100">
    </div>
    
        </div>
        

        <div class="widget-card group" style="grid-column: 1 / span 6; grid-row: 1 / span 2;" x-data>
            
            <div class="absolute top-1 right-1 px-1.5 py-0.5 bg-black/50 rounded text-[9px] text-slate-400 font-mono border border-slate-700" 
                 title="Protocol: ProtocolType.MQTT&#10;Address: drv8871/power/vm_set">
                PROTOCOLTYPE.MQTT:drv8871/power/vm_set
            </div>
            
            
    <div class="h-full flex flex-col justify-between">
        <div class="flex justify-between items-center mb-2">
            <label class="text-sm font-medium text-slate-300">电机电源电压 (VM)</label>
            <span class="text-xs font-mono bg-slate-700 px-2 py-1 rounded" x-text="values['vm_supply_slider']"></span>
        </div>
        <div class="flex-grow flex items-center">
            <input type="range" 
                   min="6.5" max="45.0" step="0.1"
                   x-model.number="values['vm_supply_slider']"
                   @input="updateValue('vm_supply_slider', $event.target.value)"
                   class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
        </div>
        <div class="flex justify-between text-[10px] text-slate-500 mt-1">
            <span>6.5</span>
            <span>45.0</span>
        </div>
    </div>
    
        </div>
        
        </div>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('hmiStore', () => ({
                // Initial State
                values: {"current_limit_slider": 1.5, "motor_enable_switch": false, "pwm_freq_input": 20.0, "vm_supply_slider": 12.0},

                // Bindings Metadata
                bindings: {"current_limit_slider": {"protocol": "mqtt", "address": "drv8871/control/current_limit", "access": "rw", "host": "localhost", "port": 1883, "topic": "drv8871/control/current_limit", "register": null, "qos": 0, "client_id": null, "username": null, "password": null, "tls": false, "update_interval_ms": 1000}, "motor_enable_switch": {"protocol": "mqtt", "address": "drv8871/control/enable", "access": "rw", "host": "localhost", "port": 1883, "topic": "drv8871/control/enable", "register": null, "qos": 0, "client_id": null, "username": null, "password": null, "tls": false, "update_interval_ms": 1000}, "pwm_freq_input": {"protocol": "mqtt", "address": "drv8871/control/frequency", "access": "rw", "host": "localhost", "port": 1883, "topic": "drv8871/control/frequency", "register": null, "qos": 0, "client_id": null, "username": null, "password": null, "tls": false, "update_interval_ms": 1000}, "vm_supply_slider": {"protocol": "mqtt", "address": "drv8871/power/vm_set", "access": "rw", "host": "localhost", "port": 1883, "topic": "drv8871/power/vm_set", "register": null, "qos": 0, "client_id": null, "username": null, "password": null, "tls": false, "update_interval_ms": 1000}},
                constraints: {"current_limit_slider": {"min": 0.0, "max": 3.5, "unit": "A", "source_ref": null}, "pwm_freq_input": {"min": 0.0, "max": 200.0, "unit": "kHz", "source_ref": null}, "vm_supply_slider": {"min": 6.5, "max": 45.0, "unit": "V", "source_ref": null}},
                runtimeConfig: {},
                events: [],
                transport: {
                    mqttClients: {},
                    mqttClientByWidget: {},
                    mqttConnected: {},
                    modbusSocket: null,
                    mockTimer: null,
                    tick: 0
                },

                init() {
                    console.log('HMI System Initialized');
                    this.logEvent('telemetry', {
                        kind: 'init',
                        widget_count: Object.keys(this.values || {}).length
                    });
                    this.initTransports();
                    window.__hmiSession = () => this.exportSessionLog();
                    this.startMockDataStream();
                },

                _normalizeAccessMode(bind) {
                    const raw = String((bind || {}).access || (bind || {}).access_mode || 'rw').toLowerCase();
                    if (raw === 'read') return 'r';
                    if (raw === 'write') return 'w';
                    if (raw === 'r' || raw === 'w' || raw === 'rw') return raw;
                    return 'rw';
                },

                _canWrite(bind) {
                    const mode = this._normalizeAccessMode(bind);
                    return mode === 'w' || mode === 'rw';
                },

                _canRead(bind) {
                    const mode = this._normalizeAccessMode(bind);
                    return mode === 'r' || mode === 'rw';
                },

                _bindingEndpoint(bind) {
                    return (bind || {}).topic
                        || (bind || {}).address
                        || (bind || {}).register
                        || (bind || {}).modbus_register
                        || '';
                },

                _toNumeric(value) {
                    if (typeof value === 'number') return value;
                    if (typeof value === 'boolean') return value ? 1 : 0;
                    const n = Number(value);
                    return Number.isFinite(n) ? n : value;
                },

                initTransports() {
                    this._initMqttClients();
                    this._initModbusBridge();
                },

                _mqttClientKey(bind) {
                    const host = (bind && bind.host) ? bind.host : 'localhost';
                    const tls = !!(bind && bind.tls);
                    const portDefault = tls ? 8084 : 8083;
                    const port = (bind && bind.port) ? bind.port : portDefault;
                    return `${tls ? 'wss' : 'ws'}://${host}:${port}`;
                },

                _initMqttClients() {
                    const widgetEntries = Object.entries(this.bindings || {})
                        .filter(([, bind]) => bind && String(bind.protocol || '').toLowerCase() === 'mqtt');
                    if (!widgetEntries.length) return;

                    if (!window.mqtt || typeof window.mqtt.connect !== 'function') {
                        this.logEvent('error', {
                            code: 'mqtt_sdk_missing',
                            message: 'mqtt.js not loaded'
                        });
                        return;
                    }

                    for (const [wid, bind] of widgetEntries) {
                        const clientKey = this._mqttClientKey(bind);
                        if (!this.transport.mqttClients[clientKey]) {
                            const tls = !!bind.tls;
                            const host = bind.host || 'localhost';
                            const port = bind.port || (tls ? 8084 : 8083);
                            const wsPath = bind.ws_path || '/mqtt';
                            const url = `${tls ? 'wss' : 'ws'}://${host}:${port}${wsPath}`;

                            const client = window.mqtt.connect(url, {
                                clientId: bind.client_id || `genui_${Date.now()}_${Math.floor(Math.random() * 10000)}`,
                                username: bind.username || undefined,
                                password: bind.password || undefined,
                                clean: true,
                                reconnectPeriod: 3000,
                                connectTimeout: 5000
                            });

                            client.on('connect', () => {
                                this.transport.mqttConnected[clientKey] = true;
                                this.logEvent('telemetry', {
                                    kind: 'mqtt_connected',
                                    broker: clientKey
                                });
                            });

                            client.on('reconnect', () => {
                                this.logEvent('telemetry', {
                                    kind: 'mqtt_reconnect',
                                    broker: clientKey
                                });
                            });

                            client.on('error', (err) => {
                                this.logEvent('error', {
                                    code: 'mqtt_error',
                                    broker: clientKey,
                                    message: String((err && err.message) || err || 'unknown')
                                });
                            });

                            client.on('message', (topic, payloadBuf) => {
                                const payloadRaw = payloadBuf ? payloadBuf.toString() : '';
                                for (const [widgetId, mappedClientKey] of Object.entries(this.transport.mqttClientByWidget || {})) {
                                    if (mappedClientKey !== clientKey) continue;
                                    const b = this.bindings[widgetId] || {};
                                    const bTopic = this._bindingEndpoint(b);
                                    if (topic === bTopic && this._canRead(b)) {
                                        this._handleTelemetry(widgetId, payloadRaw, 'mqtt');
                                    }
                                }
                            });

                            this.transport.mqttClients[clientKey] = client;
                        }

                        this.transport.mqttClientByWidget[wid] = clientKey;

                        const endpoint = this._bindingEndpoint(bind);
                        if (endpoint && this._canRead(bind)) {
                            const client = this.transport.mqttClients[clientKey];
                            try {
                                client.subscribe(endpoint, { qos: bind.qos || 0 }, (err) => {
                                    if (err) {
                                        this.logEvent('error', {
                                            code: 'mqtt_subscribe_failed',
                                            widget_id: wid,
                                            endpoint: endpoint,
                                            message: String(err.message || err)
                                        });
                                    } else {
                                        this.logEvent('telemetry', {
                                            kind: 'mqtt_subscribed',
                                            widget_id: wid,
                                            endpoint: endpoint
                                        });
                                    }
                                });
                            } catch (e) {
                                this.logEvent('error', {
                                    code: 'mqtt_subscribe_exception',
                                    widget_id: wid,
                                    endpoint: endpoint,
                                    message: String(e && e.message ? e.message : e)
                                });
                            }
                        }
                    }
                },

                _initModbusBridge() {
                    const wsUrl = (this.runtimeConfig || {}).modbus_ws_url;
                    if (!wsUrl) return;
                    try {
                        const socket = new WebSocket(wsUrl);
                        this.transport.modbusSocket = socket;

                        socket.addEventListener('open', () => {
                            this.logEvent('telemetry', {
                                kind: 'modbus_bridge_connected',
                                endpoint: wsUrl
                            });
                        });

                        socket.addEventListener('message', (ev) => {
                            let payload = null;
                            try {
                                payload = JSON.parse(ev.data);
                            } catch (_e) {
                                payload = { value: ev.data };
                            }
                            const widgetId = payload.widget_id || payload.target || payload.id;
                            if (widgetId && Object.prototype.hasOwnProperty.call(this.values, widgetId)) {
                                this._handleTelemetry(widgetId, payload, 'modbus_ws');
                            } else {
                                this.logEvent('telemetry', {
                                    kind: 'modbus_message',
                                    payload: payload
                                });
                            }
                        });

                        socket.addEventListener('error', (ev) => {
                            this.logEvent('error', {
                                code: 'modbus_bridge_error',
                                endpoint: wsUrl,
                                detail: String(ev && ev.message ? ev.message : 'bridge_error')
                            });
                        });
                    } catch (e) {
                        this.logEvent('error', {
                            code: 'modbus_bridge_exception',
                            endpoint: wsUrl,
                            detail: String(e && e.message ? e.message : e)
                        });
                    }
                },

                _handleTelemetry(widgetId, payload, protocol) {
                    let value = payload;
                    if (typeof payload === 'string') {
                        try {
                            const parsed = JSON.parse(payload);
                            value = parsed;
                        } catch (_e) {
                            value = payload;
                        }
                    }

                    let nextVal = value;
                    if (value && typeof value === 'object' && Object.prototype.hasOwnProperty.call(value, 'value')) {
                        nextVal = value.value;
                    }
                    nextVal = this._toNumeric(nextVal);
                    if (Object.prototype.hasOwnProperty.call(this.values, widgetId)) {
                        this.values[widgetId] = nextVal;
                    }
                    this.logEvent('telemetry', {
                        kind: 'value_update',
                        widget_id: widgetId,
                        value: nextVal,
                        protocol: protocol || 'unknown'
                    });
                },

                sendBindingCommand(widgetId, bind, value) {
                    if (!bind) return;
                    const protocol = String(bind.protocol || 'mock').toLowerCase();
                    const endpoint = this._bindingEndpoint(bind);

                    if (!this._canWrite(bind)) {
                        this.logEvent('error', {
                            code: 'binding_write_forbidden',
                            widget_id: widgetId,
                            protocol: protocol,
                            endpoint: endpoint
                        });
                        return;
                    }

                    if (protocol === 'mqtt') {
                        const clientKey = this.transport.mqttClientByWidget[widgetId] || this._mqttClientKey(bind);
                        const client = this.transport.mqttClients[clientKey];
                        if (!client || !endpoint) {
                            this.logEvent('error', {
                                code: 'mqtt_publish_unavailable',
                                widget_id: widgetId,
                                endpoint: endpoint || ''
                            });
                            return;
                        }
                        const payload = JSON.stringify({
                            widget_id: widgetId,
                            value: value,
                            ts_utc: new Date().toISOString()
                        });
                        try {
                            client.publish(endpoint, payload, { qos: bind.qos || 0 }, (err) => {
                                if (err) {
                                    this.logEvent('error', {
                                        code: 'mqtt_publish_failed',
                                        widget_id: widgetId,
                                        endpoint: endpoint,
                                        message: String(err.message || err)
                                    });
                                } else {
                                    this.logEvent('ack', {
                                        widget_id: widgetId,
                                        protocol: 'mqtt',
                                        endpoint: endpoint,
                                        value: value
                                    });
                                }
                            });
                        } catch (e) {
                            this.logEvent('error', {
                                code: 'mqtt_publish_exception',
                                widget_id: widgetId,
                                endpoint: endpoint,
                                message: String(e && e.message ? e.message : e)
                            });
                        }
                        return;
                    }

                    if (protocol === 'modbus') {
                        const socket = this.transport.modbusSocket;
                        const registerAddr = bind.register ?? bind.modbus_register ?? bind.address;
                        if (!socket || socket.readyState !== 1) {
                            this.logEvent('error', {
                                code: 'modbus_bridge_unavailable',
                                widget_id: widgetId,
                                register: registerAddr
                            });
                            return;
                        }
                        const payload = {
                            action: 'write_register',
                            widget_id: widgetId,
                            register: registerAddr,
                            value: value
                        };
                        socket.send(JSON.stringify(payload));
                        this.logEvent('ack', {
                            widget_id: widgetId,
                            protocol: 'modbus',
                            endpoint: registerAddr,
                            value: value
                        });
                        return;
                    }

                    this.logEvent('ack', {
                        widget_id: widgetId,
                        protocol: protocol,
                        endpoint: endpoint,
                        value: value
                    });
                },

                // Core Communication Hook
                updateValue(id, value) {
                    const guard = this.guardCommand({
                        widget_id: id,
                        value: value,
                        unit: (this.constraints[id] || {}).unit || 'unitless',
                        action: 'set_value'
                    });

                    this.logEvent('command_guard', {
                        command: {
                            widget_id: id,
                            value: value,
                            unit: (this.constraints[id] || {}).unit || 'unitless',
                            action: 'set_value'
                        },
                        allowed: guard.allowed,
                        reason: guard.reason,
                        rule_source: guard.rule_source,
                        constraint: guard.constraint
                    });

                    if (!guard.allowed) {
                        this.logEvent('error', {
                            code: 'runtime_guard_reject',
                            widget_id: id,
                            value: value,
                            reason: guard.reason
                        });
                        return;
                    }

                    this.values[id] = guard.value;
                    const bind = this.bindings[id];
                    this.logEvent('command', {
                        widget_id: id,
                        value: guard.value,
                        unit: (this.constraints[id] || {}).unit || 'unitless',
                        action: 'set_value',
                        guard: { allowed: true, reason: guard.reason }
                    });

                    if (bind) {
                        this.sendBindingCommand(id, bind, guard.value);
                    }
                },

                guardCommand(command) {
                    const c = this.constraints[command.widget_id];
                    if (!c) {
                        return {
                            allowed: true,
                            reason: 'no_constraint',
                            value: command.value,
                            rule_source: null,
                            constraint: null
                        };
                    }

                    const toNum = (v) => {
                        if (typeof v === 'number') return v;
                        if (typeof v === 'boolean') return v ? 1 : 0;
                        const n = Number(v);
                        return Number.isFinite(n) ? n : null;
                    };

                    const vNum = toNum(command.value);
                    if (vNum === null) {
                        return {
                            allowed: false,
                            reason: 'non_numeric_value',
                            value: command.value,
                            rule_source: c.source_ref || null,
                            constraint: c
                        };
                    }

                    if (c.max !== null && c.max !== undefined && vNum > Number(c.max)) {
                        return {
                            allowed: false,
                            reason: `exceeds_max:${c.max}`,
                            value: command.value,
                            rule_source: c.source_ref || null,
                            constraint: c
                        };
                    }

                    if (c.min !== null && c.min !== undefined && vNum < Number(c.min)) {
                        return {
                            allowed: false,
                            reason: `below_min:${c.min}`,
                            value: command.value,
                            rule_source: c.source_ref || null,
                            constraint: c
                        };
                    }

                    return {
                        allowed: true,
                        reason: 'within_range',
                        value: vNum,
                        rule_source: c.source_ref || null,
                        constraint: c
                    };
                },

                logEvent(eventType, payload) {
                    this.events.push({
                        ts_utc: new Date().toISOString(),
                        event_type: eventType,
                        payload: payload || {}
                    });
                },

                replaySession(events) {
                    const nextValues = JSON.parse(JSON.stringify(this.values || {}));
                    const seq = Array.isArray(events) ? events : [];
                    for (const ev of seq) {
                        if (!ev || !ev.event_type) continue;
                        if (ev.event_type === 'command' || ev.event_type === 'command_guard') {
                            const p = ev.payload || {};
                            const cmd = p.command || p;
                            const guard = p.allowed === undefined ? p.guard : { allowed: p.allowed };
                            if ((guard && guard.allowed === false) || p.allowed === false) continue;
                            const id = cmd.widget_id || cmd.target;
                            if (id && Object.prototype.hasOwnProperty.call(cmd, 'value')) {
                                nextValues[id] = cmd.value;
                            }
                        }
                    }
                    this.values = nextValues;
                    return nextValues;
                },

                exportSessionLog() {
                    return {
                        generated_utc: new Date().toISOString(),
                        events: this.events.slice(),
                        values: JSON.parse(JSON.stringify(this.values || {})),
                        transport: {
                            mqtt_connected: JSON.parse(JSON.stringify(this.transport.mqttConnected || {})),
                            has_modbus_bridge: !!(this.transport.modbusSocket && this.transport.modbusSocket.readyState === 1)
                        }
                    };
                },

                _hasLiveTelemetry() {
                    const hasMqtt = Object.keys(this.transport.mqttClients || {}).length > 0;
                    const hasModbusBridge = !!(this.transport.modbusSocket && this.transport.modbusSocket.readyState <= 1);
                    return hasMqtt || hasModbusBridge;
                },
                
                // Simulation Loop (Deterministic Mock)
                startMockDataStream() {
                    if (this._hasLiveTelemetry()) return;
                    if (this.transport.mockTimer) return;
                    const ids = Object.keys(this.values || {}).sort();
                    this.transport.mockTimer = setInterval(() => {
                        this.transport.tick += 1;
                        for (let i = 0; i < ids.length; i += 1) {
                            const wid = ids[i];
                            const bind = this.bindings[wid] || null;
                            const protocol = bind ? String(bind.protocol || '').toLowerCase() : 'mock';
                            const current = this.values[wid];
                            if (typeof current !== 'number') continue;

                            // Keep writable endpoints under operator control.
                            if (bind && this._canWrite(bind)) continue;

                            const c = this.constraints[wid] || {};
                            const min = Number.isFinite(Number(c.min)) ? Number(c.min) : 0;
                            const max = Number.isFinite(Number(c.max)) ? Number(c.max) : (min + 100);
                            const span = Math.max(max - min, 1);
                            const phase = (this.transport.tick + i) / 4;
                            const next = min + ((Math.sin(phase) + 1) / 2) * span;
                            const nextRounded = Number(next.toFixed(3));
                            this.values[wid] = nextRounded;
                            this.logEvent('telemetry', {
                                kind: 'mock_stream',
                                widget_id: wid,
                                value: nextRounded,
                                protocol: protocol || 'mock'
                            });
                        }
                    }, 1500);
                }
            }))
        })
    </script>
</body>
